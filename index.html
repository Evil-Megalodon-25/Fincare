<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fincare | Login / Signup</title>

    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #0077b6;
            --dark: #050a14;

            /* exact background requested */
            --app-bg: radial-gradient(circle, #0a1f3d, #000);
        }

        /* Page */
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--app-bg);
            color: white;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Bubbles container (same as before) */
        .bubbles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            bottom: -120px;
            border-radius: 50%;
            /* stronger white tint for more visible bubbles */
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255,255,255,0.06);
            /* slightly stronger shadow + subtle inner light */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 4px 12px rgba(255,255,255,0.04) inset;
            backdrop-filter: blur(8px) saturate(130%);
            -webkit-backdrop-filter: blur(6px) saturate(120%);
            mix-blend-mode: screen;
            will-change: transform, opacity;
            animation-name: rise;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 1;
            }

            50% {
                transform: translateY(-50vh) translateX(var(--sway)) scale(var(--s));
                opacity: calc(var(--o) * 0.9);
            }

            100% {
                transform: translateY(-120vh) translateX(calc(var(--sway) * 1.6)) scale(calc(var(--s) * 0.95));
                opacity: 0;
            }
        }

        /* Card */
        .auth-card {
            position: relative;
            z-index: 2;
            width: 360px;
            max-width: calc(100% - 48px);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(14px) saturate(120%);
            -webkit-backdrop-filter: blur(14px) saturate(120%);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 12px 40px rgba(3, 6, 12, 0.65);
            text-align: center;
            transition: transform .28s ease;
        }

        .auth-card h1 {
            margin: 0 0 6px 0;
            font-size: 22px;
        }

        .auth-card p.subtitle {
            margin: 0 0 18px 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        /* Forms */
        form {
            display: grid;
            gap: 14px;
            margin-top: 6px;
        }

        .input-group {
            position: relative;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.35);
            color: white;
            outline: none;
            font-size: 14px;
        }

        /* Eye icon - add a subtle white "bubble" behind the icon */
        .eye {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            /* increased toggle size */
            width: 28px;
            height: 28px;
            cursor: pointer;
            opacity: 1;
            display: block;
            border-radius: 50%;
            padding: 6px; /* more room to show the white bubble */
            background: rgba(255, 255, 255, 0.774); /* brighter bubble */
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.45);
            transition: background .16s ease, transform .12s ease;
        }

        .eye:active {
            transform: translateY(-50%) scale(0.98);
        }

        .eye:hover {
            background: rgba(255, 255, 255, 0.417);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #02101a;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }

        .muted {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        .link {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .error {
            color: #ff6b6b;
            font-size: 13px;
            min-height: 18px;
        }

        .success {
            color: #88ffb0;
            font-size: 13px;
            min-height: 18px;
        }

        /* Logo above the title */
        .logo {
            display: block;
            margin: 0 auto 14px;
            width: 96px; /* increased logo size */
            height: auto;
        }

        /* small screens */
        @media (max-width: 420px) {
            .auth-card {
                padding: 20px;
                width: 100%;
            }

            .logo {
                width: 80px; /* adjust mobile size */
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="bubbles" id="bubbles"></div>

    <!-- Voice controls: toggle + language select at bottom left -->
    <div class="voice-controls" style="position:fixed; bottom:20px; left:20px; display:flex; align-items:center; gap:10px; z-index:100;">
        <label style="display:flex;align-items:center;gap:8px;color:white;font-size:14px;cursor:pointer;">
            <input id="voiceToggle" type="checkbox" aria-label="Enable voice over" />
            <span style="opacity:0.95">Voice</span>
        </label>
        <select id="voiceLang" aria-label="Voice language" style="background:rgba(255,255,255,0.06);color:white;border-radius:8px;padding:6px;font-size:13px;border:1px solid rgba(255,255,255,0.08);">
            <option value="en-US">English</option>
            <option value="hi-IN">Hindi</option>
            <option value="mr-IN">Marathi</option>
            <option value="kn-IN">Kannada</option>
        </select>
    </div>

    <script>
    (function () {
        if (!('speechSynthesis' in window)) return;

        const STORE_ENABLED = 'voiceEnabled';
        const STORE_LANG = 'voiceLang';
        
        window.loadVoiceEnabled = function() { return localStorage.getItem(STORE_ENABLED) === '1'; }
        window.loadVoiceLang = function() { return localStorage.getItem(STORE_LANG) || 'en-US'; }
        function saveEnabled(v) { localStorage.setItem(STORE_ENABLED, v ? '1' : '0'); }
        function saveLang(v) { localStorage.setItem(STORE_LANG, v); }

        window.addEventListener('DOMContentLoaded', () => {
            const toggleEl = document.getElementById('voiceToggle');
            const langEl = document.getElementById('voiceLang');
            if (toggleEl) toggleEl.checked = window.loadVoiceEnabled();
            if (langEl) langEl.value = window.loadVoiceLang();
            if (toggleEl) toggleEl.addEventListener('change', () => saveEnabled(toggleEl.checked));
            if (langEl) langEl.addEventListener('change', () => saveLang(langEl.value));
        });

        let availableVoices = [];
        const translations = {
            "Switch to Signup": {
                "hi-IN": "साइनअप पर स्विच करें",
                "mr-IN": "साइनअप वर जा",
                "kn-IN": "ಸೈನ್ ಅಪ್‌ಗೆ ಬದಲಿಸಿ"
            },
            "Switch to Login": {
                "hi-IN": "लॉगिन पर स्विच करें",
                "mr-IN": "लॉगिन वर जा",
                "kn-IN": "ಲಾಗಿನ್‌ಗೆ ಬದಲಿಸಿ"
            },
            "Logging in": {
                "hi-IN": "लॉग इन हो रहा है",
                "mr-IN": "लॉग इन करत आहे",
                "kn-IN": "ಲಾಗಿನ್ ಆಗುತ್ತಿದೆ"
            },
            "Account created": {
                "hi-IN": "खाता बन गया",
                "mr-IN": "खाते तयार झाले",
                "kn-IN": "ಖಾತೆ ರಚಿಸಲಾಗಿದೆ"
            }
        };

        function refreshVoices() {
            availableVoices = window.speechSynthesis.getVoices() || [];
        }
        refreshVoices();
        window.speechSynthesis.onvoiceschanged = refreshVoices;

        function findVoiceForLang(lang) {
            if (!availableVoices.length) refreshVoices();
            return availableVoices.find(v => v.lang && v.lang.toLowerCase().startsWith(lang.toLowerCase()))
                || availableVoices.find(v => v.lang && v.lang.split('-')[0].toLowerCase() === lang.split('-')[0].toLowerCase());
        }

        window.speakTranslated = function(label, onend) {
            if (!window.loadVoiceEnabled()) {
                if (onend) onend();
                return;
            }
            try {
                window.speechSynthesis.cancel();
                const lang = window.loadVoiceLang() || 'en-US';
                let text = label;
                if (lang !== "en-US" && translations[label]) {
                    text = translations[label][lang] || label;
                }
                const u = new SpeechSynthesisUtterance(text);

                if (lang === "hi-IN" || lang === "mr-IN" || lang === "kn-IN") {
                    const hindiVoice = availableVoices.find(v => v.name === "Lekha" || v.lang === "hi-IN");
                    if (hindiVoice) {
                        u.voice = hindiVoice;
                        u.lang = "hi-IN";
                    } else {
                        u.lang = "hi-IN";
                    }
                } else {
                    const voice = findVoiceForLang(lang);
                    if (voice) {
                        u.voice = voice;
                        u.lang = voice.lang || lang;
                    } else {
                        u.lang = lang;
                    }
                }

                u.volume = 1;
                u.rate = 0.95;
                u.pitch = 1;
                u.onend = () => { if (typeof onend === 'function') onend(); };
                window.speechSynthesis.speak(u);
            } catch (err) {
                console.warn('Speech synth error:', err);
                if (typeof onend === 'function') onend();
            }
        };
    })();
    </script>

    <div class="auth-card" id="authCard">
        <img src="fincare.png" alt="Fincare logo" class="logo" />
        <h1>Fincare</h1>
        <p class="subtitle">Smart Aquarium System</p>

        <!-- Toggle links -->
        <div id="formsContainer">

            <!-- LOGIN FORM -->
            <form id="loginForm">
                <div class="input-group">
                    <input id="loginUsername" name="username" type="text" placeholder="Username" autocomplete="username" required />
                </div>

                <div class="input-group">
                    <input id="loginPassword" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
                    <!-- ensure data attributes point to the real files (assets/) -->
                    <img id="loginEye" class="eye" src="eye-closed.png" data-open="eye-open.png" data-closed="eye-closed.png" alt="toggle" title="Show / hide password" />
                </div>

                <button type="submit" class="btn">Access Dashboard</button>

                <div class="error" id="loginError"></div>

                <div class="muted">Don't have an account? <span class="link" id="toSignup">Switch to Signup</span></div>
            </form>

            <!-- SIGNUP FORM (hidden by default) -->
            <form id="signupForm" style="display:none;">
                <div class="input-group">
                    <input id="signupUsername" name="username" type="text" placeholder="Choose a username" autocomplete="username" required />
                </div>

                <div class="input-group">
                    <input id="signupPassword" name="password" type="password" placeholder="Choose a password" autocomplete="new-password" required />
                    <img id="signupEye" class="eye" src="eye-closed.png" data-open="eye-open.png" data-closed="eye-closed.png" alt="toggle" title="Show / hide password" />
                </div>

                <!-- Confirm password -->
                <div class="input-group">
                    <input id="signupConfirm" name="confirm" type="password" placeholder="Re-enter password" autocomplete="new-password" required />
                    <img id="signupConfirmEye" class="eye" src="eye-closed.png" data-open="eye-open.png" data-closed="eye-closed.png" alt="toggle" title="Show / hide confirm password" />
                </div>

                <button type="submit" class="btn">Create Account</button>

                <div class="error" id="signupError"></div>
                <div class="success" id="signupSuccess"></div>

                <div class="muted">Already have an account? <span class="link" id="toLogin">Switch to Login</span></div>
            </form>

        </div>
    </div>

    <script>
        // --- BUBBLES (kept simple and randomized) ---
        (function createBubbles() {
            const container = document.getElementById('bubbles');
            const count = 28;
            for (let i = 0; i < count; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = Math.floor(Math.random() * 62) + 8;
                b.style.width = size + 'px';
                b.style.height = size + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.animationDuration = (Math.random() * 14 + 8).toFixed(2) + 's';
                b.style.animationDelay = (Math.random() * -12).toFixed(2) + 's';
                b.style.setProperty('--sway', (Math.random() * 40 - 20).toFixed(2) + 'px');
                b.style.setProperty('--s', (Math.random() * 0.9 + 0.6).toFixed(2));
                const opa = (Math.random() * 0.2 + 0.05).toFixed(2);
                b.style.setProperty('--o', opa);
                b.style.opacity = opa;
                b.style.transform = `translateY(0) rotate(${Math.random() * 45 - 22}deg)`;
                container.appendChild(b);
            }
        })();

        // --- Simple user store in localStorage ---
        const USERS_KEY = 'fincareUsers'; // stores JSON array [{username, password}]
        function loadUsers() {
            try {
                const raw = localStorage.getItem(USERS_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }
        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        // --- Elements ---
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const toSignup = document.getElementById('toSignup');
        const toLogin = document.getElementById('toLogin');

        const loginError = document.getElementById('loginError');
        const signupError = document.getElementById('signupError');
        const signupSuccess = document.getElementById('signupSuccess');

        // --- Toggle forms ---
        toSignup.addEventListener('click', () => {
            if (window.speakTranslated) window.speakTranslated('Switch to Signup');
            loginForm.style.display = 'none';
            signupForm.style.display = 'grid';
            clearMessages();
        });
        toLogin.addEventListener('click', () => {
            if (window.speakTranslated) window.speakTranslated('Switch to Login');
            signupForm.style.display = 'none';
            loginForm.style.display = 'grid';
            clearMessages();
        });

        function clearMessages() {

            loginError.textContent = '';
            signupError.textContent = '';
            signupSuccess.textContent = '';
        }

        // --- Password visibility toggles (improved, with logging + explicit paths) ---
        function togglePasswordByImg(imgEl) {
            const group = imgEl.closest('.input-group');
            if (!group) return;
            const inputEl = group.querySelector('input[type="password"], input[type="text"]');
            if (!inputEl) return;

            // prefer explicit dataset paths, fallback to explicit relative files
            const openSrc = imgEl.dataset.open || './eye-open.png';
            const closedSrc = imgEl.dataset.closed || './eye-closed.png';

            const targetSrc = inputEl.type === 'password' ? openSrc : closedSrc;
            console.log('Toggling password. inputType:', inputEl.type, 'setting image ->', targetSrc);

            // optional: detect load errors
            imgEl.onerror = () => console.warn('Eye icon failed to load:', targetSrc);
            imgEl.onload = () => console.log('Eye icon loaded:', targetSrc);

            // toggle the input type then update the icon
            if (inputEl.type === 'password') {
                inputEl.type = 'text';
                imgEl.src = openSrc;
            } else {
                inputEl.type = 'password';
                imgEl.src = closedSrc;
            }
        }

        // Attach listeners to all eye icons (works even if elements change)
        document.querySelectorAll('.eye').forEach(img => {
            img.addEventListener('click', () => togglePasswordByImg(img));
            // make sure icon is keyboard-accessible
            img.tabIndex = 0;
            img.addEventListener('keydown', (ev) => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); togglePasswordByImg(img); } });
        });

        // --- Signup handler ---
        signupForm.addEventListener('submit', function (e) {
            e.preventDefault();
            signupError.textContent = '';
            signupSuccess.textContent = '';

            const username = document.getElementById('signupUsername').value.trim();
            const password = signupPassword.value;
            const confirm = signupConfirm.value; // new

            if (!username || !password || !confirm) {
                signupError.textContent = 'Please fill all fields.';
                return;
            }

            if (password !== confirm) { // new
                signupError.textContent = 'Passwords do not match.';
                return;
            }

            if (password.length < 4) {
                signupError.textContent = 'Password must be at least 4 characters.';
                return;
            }

            const users = loadUsers();
            if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
                signupError.textContent = 'User already exists.';
                return;
            }

            users.push({ username, password });
            saveUsers(users);

            signupSuccess.textContent = 'Account created — you can now login.';
            if (window.speakTranslated) window.speakTranslated('Account created');
            // switch to login after short delay
            setTimeout(() => {
                signupForm.reset();
                signupSuccess.textContent = '';
                signupForm.style.display = 'none';
                loginForm.style.display = 'grid';
            }, 900);
        });

        // --- Login handler ---
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();
            loginError.textContent = '';

            const username = document.getElementById('loginUsername').value.trim();
            const password = loginPassword.value;

            if (!username || !password) {
                loginError.textContent = 'Please fill all fields.';
                return;
            }

            const users = loadUsers();
            const matched = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);

            // fallback built-in admin (keeps previous behavior) — make admin username case-insensitive
            const usernameLower = username.toLowerCase();
            if (matched || (usernameLower === 'admin' && password === '1234')) {
                // keep compatibility with existing dashboard check
                localStorage.setItem('fincareUser', 'logged');
                // store the logged-in username (use 'admin' normalized)
                localStorage.setItem('fincareUserName', usernameLower === 'admin' ? 'admin' : username);
                
                if (window.speakTranslated && window.loadVoiceEnabled()) {
                    window.speakTranslated('Logging in', () => {
                        window.location.href = 'dashboard.html';
                    });
                    // Fallback to navigate if speech gets stuck
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
                } else {
                    // redirect to dashboard
                    window.location.href = 'dashboard.html';
                }
            } else {
                loginError.textContent = 'Invalid credentials.';
            }
        });

        // --- Small UX: pressing Esc clears messages ---
        document.addEventListener('keydown', (ev) => {
            if (ev.key === 'Escape') clearMessages();
        });
    </script>
</body>

</html>
